<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Snake Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #0a0a1a;
            font-family: 'Orbitron', monospace;
        }

        #gameCanvas {
            display: block;
        }

        #ui-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
        }

        #score-board {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #00ff88;
            font-size: 28px;
            font-weight: 700;
            text-shadow: 0 0 20px #00ff88, 0 0 40px #00ff88;
            letter-spacing: 2px;
        }

        #score-board span {
            font-size: 42px;
            font-weight: 900;
        }

        #high-score {
            font-size: 14px;
            color: #ff3366;
            text-shadow: 0 0 10px #ff3366;
            margin-top: 8px;
            opacity: 0.8;
        }

        #instructions {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            text-align: center;
            letter-spacing: 1px;
        }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s ease;
            pointer-events: none;
        }

        #game-over.visible {
            opacity: 1;
            pointer-events: auto;
        }

        #game-over h1 {
            font-size: 64px;
            color: #ff3366;
            text-shadow: 0 0 30px #ff3366, 0 0 60px #ff3366;
            margin-bottom: 20px;
            letter-spacing: 8px;
        }

        #game-over .final-score {
            font-size: 24px;
            color: #fff;
            margin-bottom: 40px;
        }

        #game-over .restart-hint {
            font-size: 18px;
            color: #00ff88;
            text-shadow: 0 0 15px #00ff88;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        #start-screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            transition: opacity 0.5s ease;
        }

        #start-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #start-screen h1 {
            font-size: 56px;
            color: #00ff88;
            text-shadow: 0 0 30px #00ff88, 0 0 60px #00ff88;
            margin-bottom: 30px;
            letter-spacing: 6px;
        }

        #start-screen .start-hint {
            font-size: 20px;
            color: #fff;
            text-shadow: 0 0 15px #fff;
            animation: pulse 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div id="ui-overlay">
        <div id="score-board">
            SCORE<br><span id="score">0</span>
            <div id="high-score">BEST: <span id="highScore">0</span></div>
        </div>
        
        <div id="start-screen">
            <h1>3D SNAKE</h1>
            <p class="start-hint">Press SPACE or ENTER to start</p>
        </div>

        <div id="game-over">
            <h1>GAME OVER</h1>
            <p class="final-score">Score: <span id="finalScore">0</span></p>
            <p class="restart-hint">Press SPACE or ENTER to restart</p>
        </div>

        <div id="instructions">
            Arrow Keys / WASD to move
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const GRID_SIZE = 15;
        const CELL_SIZE = 1;
        const MOVE_INTERVAL = 150;
        
        let scene, camera, renderer;
        let snake = [];
        let snakeMeshes = [];
        let foodMesh = null;
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let score = 0;
        let highScore = 0;
        let gameRunning = false;
        let gameStarted = false;
        let moveTimer = null;

        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const finalScoreElement = document.getElementById('finalScore');
        const gameOverElement = document.getElementById('game-over');
        const startScreenElement = document.getElementById('start-screen');

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a1a);
            scene.fog = new THREE.Fog(0x0a0a1a, 10, 30);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(GRID_SIZE / 2, 12, GRID_SIZE / 2 + 8);
            camera.lookAt(GRID_SIZE / 2, 0, GRID_SIZE / 2);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.insertBefore(renderer.domElement, document.body.firstChild);
            renderer.domElement.id = 'gameCanvas';

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 20, 10);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);

            const pointLight1 = new THREE.PointLight(0x00ff88, 0.5, 30);
            pointLight1.position.set(GRID_SIZE / 2, 5, GRID_SIZE / 2);
            scene.add(pointLight1);

            createGrid();
            initSnake();
            spawnFood();
            
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('keydown', onKeyDown);
            
            animate();
        }

        function createGrid() {
            const gridHelper = new THREE.GridHelper(GRID_SIZE, GRID_SIZE, 0x1a1a3a, 0x1a1a3a);
            gridHelper.position.set(GRID_SIZE / 2, -0.5, GRID_SIZE / 2);
            scene.add(gridHelper);

            const floorGeometry = new THREE.PlaneGeometry(GRID_SIZE, GRID_SIZE);
            const floorMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x0a0a1a,
                transparent: true,
                opacity: 0.8
            });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            floor.position.set(GRID_SIZE / 2, -0.51, GRID_SIZE / 2);
            floor.receiveShadow = true;
            scene.add(floor);

            const edgeMaterial = new THREE.LineBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.3 });
            const edges = [
                [[0, 0, 0], [GRID_SIZE, 0, 0]],
                [[GRID_SIZE, 0, 0], [GRID_SIZE, 0, GRID_SIZE]],
                [[GRID_SIZE, 0, GRID_SIZE], [0, 0, GRID_SIZE]],
                [[0, 0, GRID_SIZE], [0, 0, 0]]
            ];
            
            edges.forEach(edge => {
                const geometry = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(...edge[0]),
                    new THREE.Vector3(...edge[1])
                ]);
                const line = new THREE.Line(geometry, edgeMaterial);
                scene.add(line);
            });
        }

        function createSnakeSegment(x, y, isHead = false) {
            const geometry = new THREE.BoxGeometry(CELL_SIZE * 0.9, CELL_SIZE * 0.9, CELL_SIZE * 0.9);
            const material = new THREE.MeshStandardMaterial({
                color: isHead ? 0x00ff88 : 0x00cc66,
                emissive: isHead ? 0x00ff88 : 0x00cc66,
                emissiveIntensity: isHead ? 0.4 : 0.2,
                metalness: 0.3,
                roughness: 0.4
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.set(x + 0.5, 0, y + 0.5);
            mesh.castShadow = true;
            mesh.receiveShadow = true;
            scene.add(mesh);
            return mesh;
        }

        function initSnake() {
            snake = [
                { x: 5, y: 7 },
                { x: 4, y: 7 },
                { x: 3, y: 7 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };

            snakeMeshes.forEach(mesh => scene.remove(mesh));
            snakeMeshes = [];

            snake.forEach((segment, index) => {
                const mesh = createSnakeSegment(segment.x, segment.y, index === 0);
                snakeMeshes.push(mesh);
            });
        }

        function spawnFood() {
            if (foodMesh) {
                scene.remove(foodMesh);
            }

            let foodPosition;
            do {
                foodPosition = {
                    x: Math.floor(Math.random() * GRID_SIZE),
                    y: Math.floor(Math.random() * GRID_SIZE)
                };
            } while (snake.some(seg => seg.x === foodPosition.x && seg.y === foodPosition.y));

            const geometry = new THREE.SphereGeometry(CELL_SIZE * 0.35, 32, 32);
            const material = new THREE.MeshStandardMaterial({
                color: 0xff3366,
                emissive: 0xff3366,
                emissiveIntensity: 0.8,
                metalness: 0.5,
                roughness: 0.2
            });
            foodMesh = new THREE.Mesh(geometry, material);
            foodMesh.position.set(foodPosition.x + 0.5, 0.3, foodPosition.y + 0.5);
            foodMesh.castShadow = true;
            scene.add(foodMesh);
            foodMesh.userData = foodPosition;
        }

        function updateSnake() {
            direction = { ...nextDirection };

            const head = snake[0];
            const newHead = {
                x: head.x + direction.x,
                y: head.y + direction.y
            };

            if (newHead.x < 0 || newHead.x >= GRID_SIZE || newHead.y < 0 || newHead.y >= GRID_SIZE) {
                gameOver();
                return;
            }

            if (snake.some(seg => seg.x === newHead.x && seg.y === newHead.y)) {
                gameOver();
                return;
            }

            snake.unshift(newHead);

            const newHeadMesh = createSnakeSegment(newHead.x, newHead.y, true);
            snakeMeshes.unshift(newHeadMesh);

            if (snakeMeshes[1]) {
                snakeMeshes[1].material.color.setHex(0x00cc66);
                snakeMeshes[1].material.emissive.setHex(0x00cc66);
                snakeMeshes[1].material.emissiveIntensity = 0.2;
            }

            const foodPos = foodMesh.userData;
            if (newHead.x === foodPos.x && newHead.y === foodPos.y) {
                score += 10;
                scoreElement.textContent = score;
                if (score > highScore) {
                    highScore = score;
                    highScoreElement.textContent = highScore;
                }
                spawnFood();
            } else {
                snake.pop();
                const tailMesh = snakeMeshes.pop();
                scene.remove(tailMesh);
            }

            updateCamera();
        }

        function updateCamera() {
            const head = snake[0];
            const targetX = head.x + 0.5;
            const targetZ = head.y + 0.5;
            
            camera.position.x += (targetX + 3 - camera.position.x) * 0.05;
            camera.position.z += (targetZ + 10 - camera.position.z) * 0.05;
            camera.lookAt(targetX, 0, targetZ);
        }

        function gameOver() {
            gameRunning = false;
            clearInterval(moveTimer);
            moveTimer = null;
            finalScoreElement.textContent = score;
            gameOverElement.classList.add('visible');
        }

        function startGame() {
            score = 0;
            scoreElement.textContent = '0';
            initSnake();
            spawnFood();
            gameStarted = true;
            gameRunning = true;
            startScreenElement.classList.add('hidden');
            gameOverElement.classList.remove('visible');
            
            moveTimer = setInterval(updateSnake, MOVE_INTERVAL);
        }

        function onKeyDown(event) {
            if (!gameStarted) {
                if (event.code === 'Space' || event.code === 'Enter') {
                    startGame();
                }
                return;
            }

            if (!gameRunning) {
                if (event.code === 'Space' || event.code === 'Enter') {
                    startGame();
                }
                return;
            }

            switch(event.code) {
                case 'ArrowUp':
                case 'KeyW':
                    if (direction.y !== 1) {
                        nextDirection = { x: 0, y: -1 };
                    }
                    break;
                case 'ArrowDown':
                case 'KeyS':
                    if (direction.y !== -1) {
                        nextDirection = { x: 0, y: 1 };
                    }
                    break;
                case 'ArrowLeft':
                case 'KeyA':
                    if (direction.x !== 1) {
                        nextDirection = { x: -1, y: 0 };
                    }
                    break;
                case 'ArrowRight':
                case 'KeyD':
                    if (direction.x !== -1) {
                        nextDirection = { x: 1, y: 0 };
                    }
                    break;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (foodMesh) {
                foodMesh.rotation.y += 0.02;
                foodMesh.position.y = 0.3 + Math.sin(Date.now() * 0.003) * 0.1;
            }

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
